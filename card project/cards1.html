<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>cards</title>
  <style>
    *{
        padding:0 ;
        margin:0;
        box-sizing: border-box;

    }
.container{
    width:100vw;
   height: 100vh;
background-image: linear-gradient(to top, #30cfd0 0%, #330867 100%);
display:flex;
justify-content: center;
align-items: center;
}

.card{
    width:360px;
    height:600px;
    background-color: white;
    border-radius: 20px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 30px;
}
.card img{
    height: 57%;
    border-radius: 10px;
    width: fit-content;
}
.card h2{
    font-weight: bold;
    font-size: 1.5rem;
    font-family: 'Cormorant Garamond', serif;
}
.card p{
    font-family: 'Poppins', sans-serif;
    font-size: 1.2em;
    color: #555;
}
  </style>
</head>
<div class="container">
<div class="card">
    <img
    src="./images/QR_code_for_mobile_English_Wikipedia.svg.webp"
    />
    <h2>Improve your skills by developing projects</h2>
    <p>
        Lorem ipsum dolor, sit amet consectetur adipisicing elit. A fuga quo, expedita sapiente facilis obcaecati?
    </p>
</div>
</div>

</html>
