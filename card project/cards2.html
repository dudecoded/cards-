<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>cards</title>
  <style>
    *{
        padding:0 ;
        margin:0;
        box-sizing: border-box;

    }
.container{
    width:100vw;
   height: 100vh;
background-image: linear-gradient(to top, #30cfd0 0%, #330867 100%);
display:flex;
justify-content: center;
align-items: center;
}

.card{
    width:400px;
    height:600px;
    background-color: white;
    border-radius: 20px;

    display: flex;
    flex-direction: column;
    align-items: center;

    gap: 30px;
    padding:20px;
    box-shadow: rgba(0, 0, 0, 0.3) 0px 19px 38px, rgba(0, 0, 0, 0.22) 0px 15px 12px;
}
.card img{
    height: 30%;
    border-radius: 10px;
    width: 100%;
    object-fit: cover;
    aspect-ratio: 1/1;
    box-shadow: rgba(0, 0, 0, 0.3) 0px 19px 38px, rgba(0, 0, 0, 0.22) 0px 15px 12px;
}
.card h2{
    font-weight: bold;
    font-size: 1.5rem;
    font-family: 'Cormorant Garamond', serif;
}
.card p{
    font-family: 'Poppins', sans-serif;
    font-size: 1.2em;
    color: #555;

}
.textbox{
    display: flex;
    flex-direction: column;
    align-items: center;
    gap:15px;
    width: 70%;
    text-align: center;
}
#amountbox{
    width: 80%;
    
   background-image: linear-gradient(to top, #09203f 0%, #537895 100%);
   border-radius: 12px;
box-shadow: rgba(50, 50, 93, 0.25) 0px 50px 100px -20px, rgba(0, 0, 0, 0.3) 0px 30px 60px -30px, rgba(10, 37, 64, 0.35) 0px -2px 6px 0px inset;
display: flex;
justify-content: space-between;
align-items: center;
  padding: 15px 20px;
}
#leftbox{
/* width: fit-content; */
display: flex;
gap: 15px;
height: 100%;
color: aliceblue;
}
.imgbox img{
    height: 2.7rem;
    width: 4rem;
    margin: 5px;
}
#paymentbutton{
    width: 80%;
    height: 9%;
    border-radius: 12px;
   background-image: linear-gradient(to top, #09203f 0%, #537895 100%);
   color: aliceblue;
  box-shadow: rgba(0, 0, 0, 0.3) 0px 19px 38px, rgba(0, 0, 0, 0.22) 0px 15px 12px;
}
.cancelbox a{
    text-decoration: none;
    color: #09203f;
    font-weight: bold;
    font-size: large;
    font-family:'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
}
#textamountbox p:first-child{
    display: flex;
    flex-direction: column;
    justify-content: center;
    gap: 4px;
    color: white;
    font-size: 14px;

}
#textamountbox p:last-child{
    display: flex;
    flex-direction: column;
    justify-content: center;
    gap: 4px;
    color: white;
    font-size: 11px;

}
.cancelbox a{
color: aliceblue;
}
  </style>
</head>



<body>
<div class="container">

<div class="card">
    <img
    src="./images/tech.webp"
    />

    <div class="textbox">
    <h2>Order Summary</h2>
    <p>
        Lorem ipsum dolor, sit amet consectetur adipisicing elit. A fuga quo, expedita sapiente facilis obcaecati?
    </p>
    </div>

    <div id="amountbox">



<div id="leftbox">

<div class="imgbox">
    <img 
    src="images/images (1).png"
    />

</div>
<div id="textamountbox">
    <p>Amount </p>
    <p> $99.9 per year</p>
</div>
</div>


    <div class="rightbox">
       <a href="a">change</a>
    </div>
    </div>


    <button id="paymentbutton">
proceed to payment
    </button>
    <div class="cancelbox">
        <a href="a">cancel order</a>
    </div>
    </div>
</div>
</body>
</html>
